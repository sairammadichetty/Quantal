services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Bind-mount source + uvicorn --reload for dev ergonomics. Drop the
    # command override for a prod-like run.
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
