name: ci

on:
  push:
    branches: [main, env/dev1]
  pull_request:

concurrency:
  # Cancel an in-flight run when a new commit lands on the same branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: mypy
        run: mypy app

      - name: Pytest
        run: pytest -q

      # Secret scan: fails the build if any tracked file (or the full git
      # history on push) contains credentials matching gitleaks' ruleset.
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
