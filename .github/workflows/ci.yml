name: ci

on:
  push:
    branches: [main, env/**]
  pull_request:

concurrency:
  # Cancel an in-flight run when a new commit lands on the same branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # Full history so gitleaks can resolve the PR base commit's parent.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: mypy
        run: mypy app

      - name: Pytest
        run: pytest -q

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs in parallel with `checks` to keep wall time down.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: quantal-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot container + /healthz)
        run: |
          set -euo pipefail
          docker run -d --name api -p 8000:8000 quantal-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
              echo "healthz OK after ${i}s"
              docker rm -f api
              exit 0
            fi
            sleep 1
          done
          echo "::error::/healthz never returned 200 within 30s"
          docker logs api || true
          docker rm -f api || true
          exit 1
