# Install once per clone: `pre-commit install`

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Static type checking. Only `app/` is checked; tests are excluded
  # via pyproject.toml to keep strict-mode signal high.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^app/
        additional_dependencies:
          - pydantic==2.6.3
          - pydantic-settings==2.2.1
          - httpx==0.27.0
          - fastapi==0.110.0

  # Tiny safety net for whitespace and large accidental commits.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files

  # Blocks commits containing AWS keys, private keys, tokens, DB URIs, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
