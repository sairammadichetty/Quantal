# Install once per clone with `pre-commit install`. Hooks then run
# automatically on staged files before each commit, giving fast local
# feedback identical to what CI enforces.

repos:
  # Ruff: lint + format in a single repo/binary. `ruff` applies
  # autofixes for safe lint violations; `ruff-format` reformats.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Static type checking. Only `app/` is checked; tests are excluded
  # via pyproject.toml to keep strict-mode signal high.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^app/
        additional_dependencies:
          - pydantic==2.6.3
          - pydantic-settings==2.2.1
          - httpx==0.27.0
          - fastapi==0.110.0

  # Tiny safety net for whitespace and large accidental commits.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files

  # Secret scanner: blocks commits that contain AWS keys, private keys,
  # tokens, DB connection strings, etc. Uses gitleaks' default ruleset;
  # tune via a .gitleaks.toml at the repo root if false positives appear.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
